name: build

on:
  push:
    branches:
      - main
    tags:
        - "v*.*.*"
  pull_request:
    types: [opened, synchronize, reopened]

permissions:
  contents: read

jobs:
  build-cmc:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4
      - name: Setup Go
        uses: actions/setup-go@v5
        with:
          go-version: 1.26.2
      - name: Build
        run: |
          pushd cmcd
          go build -ldflags="-s -w" -trimpath
          popd
          pushd cmcctl
          go build -ldflags="-s -w" -trimpath
          popd
          pushd provision/estserver
          go build -ldflags="-s -w" -trimpath
          popd
          pushd tools/cmcbackend
          go build -ldflags="-s -w" -trimpath
          popd
          pushd tools/snptool
          go build -ldflags="-s -w" -trimpath
          popd
          pushd tools/tdxtool
          go build -ldflags="-s -w" -trimpath
          popd
          pushd tools/azuretool
          go build -ldflags="-s -w" -trimpath
          popd
          pushd tools/metatool
          go build -ldflags="-s -w" -trimpath
          popd
          pushd tools/mrtool
          go build -ldflags="-s -w" -trimpath
          popd
      - name: Vet Check
        run: go vet ./...
      - name: Format Check
        run: go fmt ./...
      - name: Static Check
        uses: dominikh/staticcheck-action@v1
        with:
          version: "latest"
          install-go: false
      - name: Misspell Check
        run: |
          go install github.com/client9/misspell/cmd/misspell@latest
          misspell .
      - name: Test
        run: go test ./...
      - name: "Upload cmcd"
        uses: actions/upload-artifact@v4
        with:
          name: cmcd
          path: cmcd/cmcd
      - name: "Upload cmcctl"
        uses: actions/upload-artifact@v4
        with:
          name: cmcctl
          path: cmcctl/cmcctl
      - name: "Upload estserver"
        uses: actions/upload-artifact@v4
        with:
          name: estserver
          path: provision/estserver/estserver
      - name: "Upload metatool"
        uses: actions/upload-artifact@v4
        with:
          name: metatool
          path: tools/metatool/metatool
      - name: "Upload mrtool"
        uses: actions/upload-artifact@v4
        with:
          name: mrtool
          path: tools/mrtool/mrtool
      - name: "Upload backend"
        uses: actions/upload-artifact@v4
        with:
          name: cmcbackend
          path: tools/cmcbackend/cmcbackend
      - name: "Upload tdxtool"
        uses: actions/upload-artifact@v4
        with:
          name: tdxtool
          path: tools/tdxtool/tdxtool
      - name: "Upload snptool"
        uses: actions/upload-artifact@v4
        with:
          name: snptool
          path: tools/snptool/snptool
      - name: "Upload azuretool"
        uses: actions/upload-artifact@v4
        with:
          name: azuretool
          path: tools/azuretool/azuretool

  build-caddy:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4
      - name: Setup Go
        uses: actions/setup-go@v5
        with:
          go-version: 1.26.2
      - name: Build caddy-atls
        run: |
          CGO_ENABLED=1 go tool xcaddy build \
            --with github.com/Fraunhofer-AISEC/cmc/tools/atlscaddy \
            --replace github.com/Fraunhofer-AISEC/cmc=.
      - name: "Upload caddy-atls"
        uses: actions/upload-artifact@v4
        with:
          name: caddy-atls
          path: caddy

  release:
    needs: [build-cmc, build-caddy]
    if: startsWith(github.ref, 'refs/tags/')
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - name: Download artifacts
        uses: actions/download-artifact@v4
        with:
          path: artifacts
      - name: Release
        uses: softprops/action-gh-release@v2
        with:
          files: |
            artifacts/cmcd/cmcd
            artifacts/cmcctl/cmcctl
            artifacts/estserver/estserver
            artifacts/metatool/metatool
            artifacts/mrtool/mrtool
            artifacts/cmcbackend/cmcbackend
            artifacts/tdxtool/tdxtool
            artifacts/snptool/snptool
            artifacts/azuretool/azuretool
            artifacts/caddy-atls/caddy
